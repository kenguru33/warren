[platformio]
default_envs = esp32cam

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv
build_flags = -DBOARD_HAS_PSRAM

[env:native]
platform = native
test_framework = unity
build_flags =
	-DUNIT_TEST
	-DWIFI_PRIMARY_TIMEOUT_MS=100
	-DWIFI_FALLBACK_TIMEOUT_MS=100
