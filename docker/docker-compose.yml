services:
  influxdb3:
    image: influxdb:3-core
    container_name: influxdb3
    ports:
      - "8086:8086"
    volumes:
      - influxdb3_data:/.data
      - ./admin.token:/admin.token:ro
    command: >
      influxdb3 serve
      --http-bind=0.0.0.0:8086
      --admin-token-file=/admin.token
      --node-id=node1

  influxdb3-explorer:
    image: influxdata/influxdb3-ui:1.6.2
    container_name: influxdb3-explorer
    ports:
      - "8888:80"
      - "8889:8888"
    depends_on:
      - influxdb3
    command: --mode=admin

  nodered:
    image: nodered/node-red:latest
    container_name: node-red
    ports:
      - "1880:1880"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - node_red_data:/data
      - ./nodered/flows.json:/data/flows.json
    depends_on:
      - influxdb3
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config

  caddy:
    # Local-CA mode uses the stock image (default). Let's Encrypt mode
    # uses a custom image built by `warren setup` with the chosen
    # caddy-dns provider plugin baked in (warren-caddy:latest).
    image: ${CADDY_IMAGE:-caddy:2.10-alpine}
    container_name: caddy
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WARREN_TLS_MODE: ${WARREN_TLS_MODE:-local}
      WARREN_HOSTNAME: ${WARREN_HOSTNAME:-warren.local}
      WARREN_DOMAIN: ${WARREN_DOMAIN:-}
      WARREN_ACME_EMAIL: ${WARREN_ACME_EMAIL:-}
      WARREN_DNS_PROVIDER: ${WARREN_DNS_PROVIDER:-}
      WARREN_DNS_TOKEN: ${WARREN_DNS_TOKEN:-}
      WARREN_UPSTREAM: ${WARREN_UPSTREAM:-host.docker.internal:3000}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/site:/srv:ro
      - ./tls:/etc/caddy/tls:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  node_red_data:
  influxdb3_data:
  caddy_data:
  caddy_config:
