per_listener_settings true

# Plaintext listener — bridge-network access (UI container) plus host
# loopback (dev-mode UI on the host). Not LAN-reachable: docker-compose
# binds the host port to 127.0.0.1 only.
listener 1883 0.0.0.0
listener_allow_anonymous false
password_file /mosquitto/config/passwordfile

# Anonymous internal listener used by Node-RED on the Docker bridge
# network. Not exposed on any host port.
listener 1884 0.0.0.0
listener_allow_anonymous true

# MQTTS listener — LAN-reachable for ESP32 sensors. Reuses the same
# self-signed leaf cert Caddy serves (covers the host's LAN IP).
# require_certificate=false: clients only validate the broker's cert,
# they don't present one of their own.
listener 8883 0.0.0.0
listener_allow_anonymous false
password_file /mosquitto/config/passwordfile
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate false
tls_version tlsv1.2
